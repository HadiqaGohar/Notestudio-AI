services:
  - type: web
    name: notestudio-ai-backend
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: chmod +x ./bin/install_ffmpeg.sh && ./bin/install_ffmpeg.sh && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12"
    plan: free
